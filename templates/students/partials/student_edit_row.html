<tr class="bg-indigo-50/30 animate-in fade-in duration-300">
    <td colspan="7" class="p-6 border-y-2 border-indigo-200">
        
        <div class="max-w-5xl mx-auto bg-white p-6 rounded-2xl shadow-sm border border-indigo-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-indigo-800 text-lg flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    শিক্ষার্থীর তথ্য সংশোধন
                </h3>
                <span class="text-xs font-medium text-indigo-400 bg-indigo-50 px-2 py-1 rounded">ID: {{ student.roll_number }}</span>
            </div>

            <form hx-post="{% url 'students:update_student' student.id %}" 
                  hx-target="closest tr" 
                  hx-swap="outerHTML"
                  hx-encoding="multipart/form-data"
                  class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">রোল নং</label>
                        <input type="text" name="roll_number" value="{{ student.roll_number }}" class="w-full border border-gray-200 p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">লিঙ্গ</label>
                        <select name="gender" class="w-full border border-gray-200 p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            <option value="male" {% if student.gender == 'male' %}selected{% endif %}>Male</option>
                            <option value="female" {% if student.gender == 'female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">নাম (First Name)</label>
                        <input type="text" name="first_name" value="{{ student.user.first_name }}" class="w-full border border-gray-200 p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">পদবী (Last Name)</label>
                        <input type="text" name="last_name" value="{{ student.user.last_name }}" class="w-full border border-gray-200 p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">ক্লাস</label>
                        <select name="classroom" class="w-full border border-gray-200 p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            {% for c in classrooms %}
                                <option value="{{ c.id }}" {% if c.id == student.classroom.id %}selected{% endif %}>{{ c.name }} - {{ c.campus.name|default:"N/A" }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">শাখা</label>
                        <select name="section" class="w-full border border-gray-200 p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            {% for s in sections %}
                                <option value="{{ s.id }}" {% if s.id == student.section.id %}selected{% endif %}>{{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">মোবাইল</label>
                        <input type="text" name="guardian_phone" value="{{ student.guardian_phone }}" class="w-full border border-gray-200 p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">ছবি পরিবর্তন</label>
                        <input type="file" name="profile_picture" class="w-full text-xs text-gray-400 file:mr-2 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">ঠিকানা</label>
                    <input type="text" name="guardian_address" value="{{ student.guardian_address }}" class="w-full border border-gray-200 p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>

                <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
                    <button type="button" onclick="window.location.reload()" 
                            class="px-6 py-2 text-sm font-bold text-gray-500 bg-gray-50 rounded-xl hover:bg-gray-100 transition duration-200">
                        বাতিল করুন
                    </button>
                    <button type="submit" 
                            class="px-8 py-2 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition duration-200 shadow-md shadow-indigo-100">
                        আপডেট করুন
                    </button>
                </div>
            </form>
        </div>
    </td>
</tr>
