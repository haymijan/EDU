<tr class="hover:bg-gray-50 transition duration-150 text-sm border-b border-gray-100">
    <td class="px-6 py-4 font-mono text-indigo-600 font-bold">
        {{ subject.code }}
    </td>
    <td class="px-6 py-4 font-semibold text-gray-800">
        {{ subject.name }}
    </td>
    <td class="px-6 py-4 text-right">
        <div class="flex space-x-2 justify-end">
            <button hx-get="{% url 'academics:edit_subject' subject.id %}" hx-target="closest tr" hx-swap="outerHTML" class="text-xs font-medium bg-blue-50 text-blue-600 px-3 py-1.5 rounded hover:bg-blue-600 hover:text-white transition shadow-sm">Edit</button>
            <form hx-post="{% url 'academics:delete_subject' subject.id %}" hx-target="closest tr" hx-swap="outerHTML" hx-confirm="মুছে ফেলতে চান?" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="text-xs font-medium bg-red-50 text-red-600 px-3 py-1.5 rounded hover:bg-red-600 hover:text-white transition shadow-sm">Delete</button>
            </form>
        </div>
    </td>
</tr>
