{% extends 'base.html' %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-indigo-500">
        <h3 class="text-gray-500 text-sm font-bold uppercase">Total Students</h3>
        <p class="text-3xl font-bold">{{ total_students }}</p>
        <a href="{% url 'students:student_list' %}" class="text-indigo-600 text-sm hover:underline mt-2 inline-block">View All Students →</a>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500">
        <h3 class="text-gray-500 text-sm font-bold uppercase">Active Classes</h3>
        <p class="text-3xl font-bold">0</p>
        <p class="text-sm text-gray-400 italic">Coming Soon (Academics Module)</p>
    </div>
</div>
{% endblock %}
