{% extends 'base.html' %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">ক্যাম্পাস ব্যবস্থাপনা</h1>
            <p class="text-sm text-gray-500">প্রতিষ্ঠানের বিভিন্ন ক্যাম্পাস বা শাখা যুক্ত করুন।</p>
        </div>
    </div>

    <form hx-post="{% url 'academics:add_campus_htmx' %}" hx-target="#campus-table-body" hx-swap="afterbegin" 
          hx-on::after-request="if(event.detail.successful) { this.reset(); }" 
          class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 flex gap-4 items-end">
        {% csrf_token %}
        <div class="flex-1">
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">ক্যাম্পাসের নাম *</label>
            <input type="text" name="name" placeholder="যেমন: General Campus" class="w-full border border-gray-200 p-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div class="flex-1">
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">ঠিকানা</label>
            <input type="text" name="address" placeholder="ঐচ্ছিক" class="w-full border border-gray-200 p-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="bg-blue-600 text-white px-8 py-2.5 rounded-lg text-sm font-bold hover:bg-blue-700 transition shadow-sm">
            যুক্ত করুন
        </button>
    </form>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <table class="w-full text-left">
            <thead>
                <tr class="text-xs font-bold text-gray-400 bg-gray-50/50 border-b uppercase">
                    <th class="px-6 py-4">ক্যাম্পাসের নাম</th>
                    <th class="px-6 py-4">ঠিকানা</th>
                    <th class="px-6 py-4 text-right">অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="campus-table-body" class="divide-y divide-gray-50">
                {% for campus in campuses %}
                    {% include 'academics/partials/campus_row.html' %}
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
