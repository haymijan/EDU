<tr class="hover:bg-gray-50 transition border-b border-gray-100 text-sm">
    <td class="px-6 py-4 font-bold text-blue-700">{{ campus.name }}</td>
    <td class="px-6 py-4 text-gray-500">{{ campus.address|default:"-" }}</td>
    <td class="px-6 py-4 text-right">
        <form hx-post="{% url 'academics:delete_campus' campus.id %}" hx-target="closest tr" hx-swap="outerHTML" hx-confirm="মুছে ফেলতে চান?" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="text-xs font-medium bg-red-50 text-red-600 px-3 py-1.5 rounded hover:bg-red-600 hover:text-white transition">Delete</button>
        </form>
    </td>
</tr>
